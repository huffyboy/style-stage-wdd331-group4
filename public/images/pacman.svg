<svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <mask id="pacman-mask">
      <!-- visible area -->
      <rect width="100%" height="100%" fill="white"/>
      <!-- hidden area (mouth) -->
      <polygon points="50,50 100,20 100,80" fill="black"/>
    </mask>
  </defs>
  <!-- Pac-Man -->
  <circle cx="50" cy="50" r="40" fill="yellow" mask="url(#pacman-mask)" />
</svg>
